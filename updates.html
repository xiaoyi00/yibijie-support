<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>医笔捷功能更新</title>
  <meta name="description" content="医笔捷安卓、小程序、iOS 功能更新记录页，按最新日期展示产品更新、优化与修复内容。">
  <style>
    :root {
      --bg: #f7f2ea;
      --bg-accent: #e4efe8;
      --ink: #1f1f1d;
      --muted: #5a5a55;
      --card: rgba(255, 255, 255, 0.88);
      --line: rgba(31, 31, 29, 0.12);
      --primary: #e66a2c;
      --shadow: 0 24px 60px rgba(40, 32, 24, 0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      background:
        radial-gradient(1000px 700px at 15% 10%, #fff7e6 0%, rgba(255, 255, 255, 0) 60%),
        radial-gradient(1200px 900px at 90% 15%, var(--bg-accent) 0%, rgba(255, 255, 255, 0) 65%),
        var(--bg);
    }
    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 72px 24px 84px;
    }
    .hero,
    .toolbar,
    .entry {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.85);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.8fr);
      gap: 24px;
      padding: 28px;
    }
    .hero h1 {
      margin: 16px 0 0;
      font-size: clamp(2.8rem, 5vw, 4.3rem);
      line-height: 0.98;
    }
    .hero p {
      margin-top: 16px;
      max-width: 34rem;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
    }
    .hero-grid {
      display: grid;
      gap: 14px;
    }
    .stat-card {
      padding: 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid var(--line);
    }
    .stat-label {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .stat-value {
      margin-top: 10px;
      font-size: 1.9rem;
      font-weight: 700;
    }
    .stat-note {
      margin-top: 6px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }
    .toolbar {
      margin-top: 28px;
      padding: 18px;
    }
    .toolbar-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    .filter-button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .filter-button.is-active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }
    .timeline {
      display: grid;
      gap: 18px;
      margin-top: 28px;
    }
    .entry {
      padding: 22px 24px;
    }
    .entry-date {
      display: inline-flex;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(230, 106, 44, 0.12);
      color: #c24d1a;
      font-size: 13px;
      font-weight: 700;
    }
    .entry h3 {
      margin: 14px 0 0;
      font-size: 1.5rem;
    }
    .entry-summary {
      margin-top: 10px;
      color: var(--muted);
      line-height: 1.65;
    }
    .meta-row,
    .versions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    .platform-pill,
    .tag,
    .version-chip {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
    }
    .platform-pill.android { background: rgba(47, 143, 103, 0.12); color: #216949; }
    .platform-pill.miniprogram { background: rgba(45, 108, 223, 0.12); color: #1f4fa6; }
    .platform-pill.ios { background: rgba(108, 79, 211, 0.12); color: #4d34a8; }
    .tag { background: rgba(31, 31, 29, 0.08); color: var(--ink); }
    .version-chip {
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--line);
      color: var(--muted);
    }
    .list {
      margin: 18px 0 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.7;
    }
    .empty {
      padding: 30px 24px;
      border: 1px dashed var(--line);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.76);
      color: var(--muted);
      text-align: center;
    }
    @media (max-width: 960px) {
      .hero { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div>
        <div>Yibijie Updates</div>
        <h1>医笔捷功能更新</h1>
        <p>这里会持续记录医笔捷安卓、小程序和 iOS 的功能更新。你可以直接查看最近新增了什么、优化了什么、修复了什么。</p>
      </div>
      <div class="hero-grid">
        <section class="stat-card">
          <div class="stat-label">最近更新时间</div>
          <div class="stat-value" id="latest-date">2026年03月30日</div>
          <div class="stat-note">页面会把最新日期的更新自动排在最前面。</div>
        </section>
        <section class="stat-card">
          <div class="stat-label">覆盖平台</div>
          <div class="stat-value">安卓 / 小程序 / iOS</div>
          <div class="stat-note">一个页面统一查看，不需要来回切换不同平台的公告。</div>
        </section>
      </div>
    </section>

    <section class="toolbar">
      <div class="toolbar-top">
        <div>
          <h2>按平台筛选更新</h2>
          <div>默认显示全部平台，最新日期优先。</div>
        </div>
        <div id="result-count">0 条更新</div>
      </div>
      <div class="filters" id="filters">
        <button class="filter-button is-active" type="button" data-platform-filter="all" aria-pressed="true">全部</button>
        <button class="filter-button" type="button" data-platform-filter="android" aria-pressed="false">安卓</button>
        <button class="filter-button" type="button" data-platform-filter="miniprogram" aria-pressed="false">小程序</button>
        <button class="filter-button" type="button" data-platform-filter="ios" aria-pressed="false">iOS</button>
      </div>
    </section>

    <section class="timeline" id="timeline"></section>
  </main>

  <script>
    const platformMeta = {
      android: { label: "安卓", className: "android" },
      miniprogram: { label: "小程序", className: "miniprogram" },
      ios: { label: "iOS", className: "ios" }
    };

    const updates = [
  {
    "date" : "2026-03-30",
    "id" : "legacy-2026-03-30-1",
    "items" : [
      "后台设备管理优化。"
    ],
    "platforms" : [
      "android",
      "miniprogram",
      "ios"
    ],
    "summary" : "这次更新使用更清楚、也更稳定。",
    "tags" : [
      "优化",
      "修复"
    ],
    "title" : "设备统计与多端体验继续优化",
    "version" : {
      "android" : "3.2.2"
    }
  },
  {
    "date" : "2026-03-25",
    "id" : "legacy-2026-03-25-1",
    "items" : [
      "会员购买进行优化。"
    ],
    "platforms" : [
      "ios"
    ],
    "summary" : "这一轮主要针对 Apple 购买成功但会员状态未及时开通的问题做稳定性增强。",
    "tags" : [
      "优化",
      "修复"
    ],
    "title" : "会员购买与恢复体验优化",
    "version" : {

    }
  },
  {
    "date" : "2026-03-18",
    "id" : "legacy-2026-03-18-1",
    "items" : [
      "模板发送过程增加了更直观的进度反馈。",
      "蓝牙提升常见场景下的稳定性。"
    ],
    "platforms" : [
      "android",
      "miniprogram"
    ],
    "summary" : "这次更新重点提升模板发送时的进度反馈和蓝牙发送过程的稳定性。",
    "tags" : [
      "新增",
      "优化"
    ],
    "title" : "模板发送和蓝牙发送体验优化",
    "version" : {

    }
  },
  {
    "date" : "2026-02-14",
    "id" : "legacy-2026-02-14-1",
    "items" : [
      "上线公开可访问的隐私政策页面。",
      "补充支持联系方式和常见问题入口。",
      "便于审核、用户查阅和后续维护。"
    ],
    "platforms" : [
      "ios"
    ],
    "summary" : "为了便于用户查看合规信息和联系支持，医笔捷上线了公开的隐私政策与支持页面。",
    "tags" : [
      "新增"
    ],
    "title" : "隐私政策与支持页面上线",
    "version" : {

    }
  }
];

    const state = { platform: "all" };
    const timelineEl = document.getElementById("timeline");
    const resultCountEl = document.getElementById("result-count");
    const filterEls = Array.from(document.querySelectorAll("[data-platform-filter]"));

    function sortUpdates(items) {
      return items.slice().sort((left, right) => {
        if (left.date === right.date) {
          return left.id.localeCompare(right.id);
        }
        return right.date.localeCompare(left.date);
      });
    }

    function filterUpdates(items, platform) {
      if (platform === "all") {
        return sortUpdates(items);
      }
      return sortUpdates(items).filter((item) => item.platforms.includes(platform));
    }

    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function createPlatformPills(platforms) {
      return platforms.map((platform) => {
        const meta = platformMeta[platform];
        return `<span class="platform-pill ${meta.className}">${meta.label}</span>`;
      }).join("");
    }

    function createTags(tags) {
      return tags.map((tag) => `<span class="tag">${escapeHTML(tag)}</span>`).join("");
    }

    function createVersions(version) {
      const order = ["android", "miniprogram", "ios"];
      const chips = order.filter((key) => version[key]).map((key) => {
        const label = platformMeta[key].label;
        return `<span class="version-chip">${label} ${escapeHTML(version[key])}</span>`;
      });
      return chips.length ? `<div class="versions">${chips.join("")}</div>` : "";
    }

    function createItems(items) {
      return `<ul class="list">${items.map((item) => `<li>${escapeHTML(item)}</li>`).join("")}</ul>`;
    }

    function renderUpdates(items) {
      if (!items.length) {
        timelineEl.innerHTML = '<div class="empty">当前筛选条件下还没有更新记录。</div>';
        return;
      }

      timelineEl.innerHTML = items.map((item) => `
        <article class="entry">
          <div class="entry-date">${escapeHTML(item.date.replace(/-/g, "年").replace(/-(?=\d{2}$)/, "月") + "日")}</div>
          <h3>${escapeHTML(item.title)}</h3>
          <p class="entry-summary">${escapeHTML(item.summary)}</p>
          <div class="meta-row">${createPlatformPills(item.platforms)}${createTags(item.tags)}</div>
          ${createVersions(item.version || {})}
          ${createItems(item.items || [])}
        </article>
      `).join("");
    }

    function updateFilterButtons() {
      filterEls.forEach((button) => {
        const active = button.getAttribute("data-platform-filter") === state.platform;
        button.classList.toggle("is-active", active);
        button.setAttribute("aria-pressed", active ? "true" : "false");
      });
    }

    function renderPage() {
      const visible = filterUpdates(updates, state.platform);
      resultCountEl.textContent = `${visible.length} 条更新`;
      renderUpdates(visible);
      updateFilterButtons();
    }

    filterEls.forEach((button) => {
      button.addEventListener("click", () => {
        state.platform = button.getAttribute("data-platform-filter") || "all";
        renderPage();
      });
    });

    renderPage();
  </script>
</body>
</html>
